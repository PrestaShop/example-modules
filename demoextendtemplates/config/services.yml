services:
  # The decoration is defined thanks to the #[AsDecorator] and #[MapDecorated] attributes in the class itself
  PrestaShop\Module\DemoExtendTemplates\Controller\DecoratedOrderController:
    autowire: true
    autoconfigure: true

  # Alternative approach using an event subscriber - simpler and more maintainable,
  # but does not allow modifying the controller's return value or its injected arguments.
  # Uncomment to use instead of the decorator above (and comment out the decorator).
  #PrestaShop\Module\DemoExtendTemplates\EventSubscriber\OrderControllerSubscriber:
  #  autowire: true
  #  autoconfigure: true
